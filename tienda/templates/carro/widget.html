<table class='table table-bordered' style='color:white'>
    <thead>
        <tr>
            <th colspan='3' class='text-center'>Carro de Compras</th>
        </tr>
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Suma</th>
        </tr>
    </thead>

    <tbody>
        
        {% if request.session.carro.items %}
            
            {% for key, value in request.session.carro.items %}
                <tr class='text-center'>
                    <td>{{value.nombre}}</td>
                    <td>{{value.cantidad}}</td>
                    <td>
                        <a href="{% url 'carro:agregar_producto' value.producto_id %}" class="btn btn-success btn-sm">+</a>
                        <a href="{% url 'carro:restar_producto' value.producto_id %}" class="btn btn-warning btn-sm">-</a>
                        <br>
                        {{value.precio|floatformat:2}}&nbsp;$
                    </td>
                </tr>
            {% endfor %}
        
        {% else %}
            <tr>
                <td colspan='3'>
                    <div class='alert alert-danger text-center'>El carro esta vacio</div>
                </td>
            </tr>
                
        {% endif %}
            
    </tbody>

    <tfoot>
        <tr>
            <td colspan='3' class='text-center'>
                Total: $&nbsp;{{importe_total_carro}}
            </td>
        </tr>
    </tfoot>
</table>
